name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /app

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building and restarting services..."
            docker compose -f docker-compose.prod.yml build --no-cache backend frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend nginx

            echo "==> Running database migrations..."
            docker exec eduplatform_backend npx prisma migrate deploy

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy complete!"

      - name: Notify on success
        if: success()
        run: echo "Deployment to production succeeded."

      - name: Notify on failure
        if: failure()
        run: echo "Deployment to production FAILED. Check the logs."
